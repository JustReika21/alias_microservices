<head>
    <meta charset="UTF-8">
    <title>Create Game</title>
    <link rel="stylesheet" href="/css/create_game.css">
</head>
<body>

<div class="container">
    <h1>Create Game</h1>

    <form id="gameForm">
        <label>Rounds</label>
        <input type="number" id="rounds" required>

        <label>Time (seconds)</label>
        <input type="number" id="time" value="60" required>

        <label>Pack</label>
        <input type="number" id="pack" required>

        <label>Password (optional)</label>
        <input type="text" id="password">

        <button type="submit">Create</button>
    </form>

    <div id="result"></div>
</div>

<script type="module" src="/js/create_game.js"></script>
</body>
