services:
  cards-db:
    image: postgres:17
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - cards_data:/var/lib/postgresql/data

  packs-db:
    image: postgres:17
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - packs_data:/var/lib/postgresql/data

  cards:
    build:
      context: services/cards_service
    container_name: cards_service
    volumes:
      - ./services/cards_service/src:/app/src
      - ./services/cards_service/alembic:/app/alembic
    env_file:
      - services/cards_service/.env
    depends_on:
      - cards-db
    ports:
      - "8001:8000"

  packs:
    build:
      context: services/packs_service
    container_name: packs_service
    volumes:
      - ./services/packs_service/src:/app/src
      - ./services/packs_service/alembic:/app/alembic
    env_file:
      - services/packs_service/.env
    depends_on:
      - packs-db
    ports:
      - "8002:8000"


volumes:
  cards_data:
  packs_data: