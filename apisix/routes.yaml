routes:
  - id: 100
    name: frontend_root
    uri: /
    methods: [ GET ]
    upstream:
      type: roundrobin
      nodes:
        "frontend:80": 1
    plugins:
      limit-req:
        rate: 15
        burst: 30
        key: remote_addr
        rejected_code: 429
      limit-count:
        count: 300
        time_window: 60
        key: remote_addr
        policy: local
        rejected_code: 429

  - id: 1
    name: cards_post
    uri: /api/v1/cards/*
    methods: [POST]
    upstream:
      type: roundrobin
      nodes:
        "cards:8000": 1
    plugins:
      forward-auth:
        uri: http://auth:8000/api/v1/auth/verify
        request_headers: [Authorization]
        upstream_headers: [X-User-Id]
      limit-req:
        rate: 15
        burst: 30
        key: remote_addr
        rejected_code: 429
      limit-count:
        count: 300
        time_window: 60
        key: remote_addr
        policy: local
        rejected_code: 429

  - id: 2
    name: cards_get
    uri: /api/v1/cards
    methods: [ GET ]
    upstream:
      type: roundrobin
      nodes:
        "cards:8000": 1
    plugins:
      forward-auth:
        uri: http://auth:8000/api/v1/auth/verify
        request_headers: [ Authorization ]
        upstream_headers: [ X-User-Id ]
      limit-req:
        rate: 10
        burst: 20
        key: remote_addr
        rejected_code: 429
      limit-count:
        count: 200
        time_window: 60
        key: remote_addr
        policy: local
        rejected_code: 429

  - id: 3
    name: cards_cd
    uri: /api/v1/cards
    methods: [ POST, DELETE ]
    upstream:
      type: roundrobin
      nodes:
        "cards:8000": 1
    plugins:
      forward-auth:
        uri: http://auth:8000/api/v1/auth/verify
        request_headers: [ Authorization ]
        upstream_headers: [ X-User-Id ]
      limit-req:
        rate: 5
        burst: 10
        key: remote_addr
        rejected_code: 429
      limit-count:
        count: 25
        time_window: 60
        key: remote_addr
        policy: local
        rejected_code: 429

  - id: 4
    name: game_ws
    uri: /ws/game/*
    methods: [ GET ]
    enable_websocket: true
    upstream:
      type: roundrobin
      nodes:
        "game:8000": 1
      timeout:
        connect: 5
        send: 3600
        read: 3600
      keepalive_pool:
        size: 20
        idle_timeout: 60
        requests: 10000
    plugins:
      limit-req:
        rate: 10
        burst: 20
        key: remote_addr
        rejected_code: 429
      limit-conn:
        conn: 5
        burst: 5
        default_conn_delay: 0.01
        key: remote_addr

  - id: 5
    name: auth_me
    uri: /api/v1/auth/me
    priority: 100
    methods: [ GET ]
    upstream:
      type: roundrobin
      nodes:
        "auth:8000": 1
    plugins:
      forward-auth:
        uri: http://auth:8000/api/v1/auth/verify
        request_headers: [ Authorization ]
        upstream_headers: [ X-User-Id ]
      limit-req:
        rate: 10
        burst: 20
        key: remote_addr
        rejected_code: 429
      limit-count:
        count: 200
        time_window: 60
        key: remote_addr
        policy: local
        rejected_code: 429

  - id: 6
    name: auth_register
    uri: /api/v1/auth/register
    priority: 100
    methods: [ POST ]
    upstream:
      type: roundrobin
      nodes:
        "auth:8000": 1
    plugins:
      limit-req:
        rate: 1
        burst: 2
        key: remote_addr
        rejected_code: 429
      limit-count:
        count: 2
        time_window: 60
        key: remote_addr
        policy: local
        rejected_code: 429

  - id: 7
    name: auth
    uri: /api/v1/auth/*
    priority: 1
    methods: [GET, POST]
    upstream:
      type: roundrobin
      nodes:
        "auth:8000": 1
    plugins:
      limit-req:
        rate: 15
        burst: 30
        key: remote_addr
        rejected_code: 429
      limit-count:
        count: 300
        time_window: 60
        key: remote_addr
        policy: local
        rejected_code: 429

  - id: 8
    name: game
    uri: /api/v1/game
    methods: [POST]
    upstream:
      type: roundrobin
      nodes:
        "game:8000": 1
    plugins:
      forward-auth:
        uri: http://auth:8000/api/v1/auth/verify
        request_headers: [Authorization]
        upstream_headers: [X-User-Id]
      limit-req:
        rate: 1
        burst: 2
        key: remote_addr
        rejected_code: 429
      limit-count:
        count: 2
        time_window: 60
        key: remote_addr
        policy: local
        rejected_code: 429

  - id: 9
    name: packs_get
    uri: /api/v1/packs
    methods: [GET]
    upstream:
      type: roundrobin
      nodes:
        "packs:8000": 1
    plugins:
      forward-auth:
        uri: http://auth:8000/api/v1/auth/verify
        request_headers: [Authorization]
        upstream_headers: [X-User-Id]
      limit-req:
        rate: 10
        burst: 20
        key: remote_addr
        rejected_code: 429
      limit-count:
        count: 50
        time_window: 60
        key: remote_addr
        policy: local
        rejected_code: 429

  - id: 10
    name: packs_post
    uri: /api/v1/packs
    methods: [POST]
    upstream:
      type: roundrobin
      nodes:
        "packs:8000": 1
    plugins:
      forward-auth:
        uri: http://auth:8000/api/v1/auth/verify
        request_headers: [Authorization]
        upstream_headers: [X-User-Id]
      limit-req:
        rate: 2
        burst: 4
        key: remote_addr
        rejected_code: 429
      limit-count:
        count: 2
        time_window: 60
        key: remote_addr
        policy: local
        rejected_code: 429

  - id: 11
    name: packs_fetch
    uri: /api/v1/packs/*
    methods: [GET]
    upstream:
      type: roundrobin
      nodes:
        "packs:8000": 1
    plugins:
      forward-auth:
        uri: http://auth:8000/api/v1/auth/verify
        request_headers: [Authorization]
        upstream_headers: [X-User-Id]
      limit-req:
        rate: 5
        burst: 10
        key: remote_addr
        rejected_code: 429
      limit-count:
        count: 50
        time_window: 60
        key: remote_addr
        policy: local
        rejected_code: 429

  - id: 12
    name: packs_put
    uri: /api/v1/packs/*
    methods: [PUT]
    upstream:
      type: roundrobin
      nodes:
        "packs:8000": 1
    plugins:
      forward-auth:
        uri: http://auth:8000/api/v1/auth/verify
        request_headers: [Authorization]
        upstream_headers: [X-User-Id]
      limit-req:
        rate: 2
        burst: 4
        key: remote_addr
        rejected_code: 429
      limit-count:
        count: 5
        time_window: 60
        key: remote_addr
        policy: local
        rejected_code: 429

  - id: 13
    name: packs_delete
    uri: /api/v1/packs/*
    methods: [DELETE]
    upstream:
      type: roundrobin
      nodes:
        "packs:8000": 1
    plugins:
      forward-auth:
        uri: http://auth:8000/api/v1/auth/verify
        request_headers: [Authorization]
        upstream_headers: [X-User-Id]
      limit-req:
        rate: 5
        burst: 10
        key: remote_addr
        rejected_code: 429
      limit-count:
        count: 25
        time_window: 60
        key: remote_addr
        policy: local
        rejected_code: 429
