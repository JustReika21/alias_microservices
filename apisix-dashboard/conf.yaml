    - 172.16.0.0/12
    - 10.0.0.0/8

  etcd:
    endpoints:
      - "http://etcd:2379"

    mtls:
      key_file: ""
      cert_file: ""
      ca_file: ""

authentication:
  secret:
    "SuperSecretADMINapiKeyFORAPisixDashboardSUPERSECRET1"

  expire_time: 3600

  users:
    - username: admin
      password: "SuperSecretADMINapiKeyFORAPisixDashoard"

plugins:
  - forward-auth